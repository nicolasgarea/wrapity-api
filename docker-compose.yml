services:
  db:
    image: mysql:8.0
    container_name: wrapity-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wrapity
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: wrapity-api
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/wrapity
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  mysql_data:
